<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MySkyn – Ingredient Analyzer</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif; /* BODY FONT */
            background: linear-gradient(135deg, #F5ECEC, #eef1ff);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top App Bar */
        .navbar {
            padding: 20px 40px;
            font-size: 28px;
            font-weight: 700;
            color: #7A4A4A;
            font-family: 'Playfair Display', serif; /* BRAND FONT */
        }

        /* Center Container */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card */
        .card {
            background: white;
            padding: 40px;
            width: 500px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
            font-family: 'Playfair Display', serif; 
            color: #2d1f1f;
        }

        p {
            text-align: center;
            color: #4A3A3A;
            font-size: 14px;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: vertical;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary-btn {
            background: #8A5A5A;
            color: white;
        }

        .primary-btn:hover {
            background: #8A5A5A;
        }

        .secondary-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #8A5A5A;
            text-decoration: none;
            font-weight: 500;
        }

        .secondary-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- App Name -->
    <div class="navbar">
        MySkyn
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="card">

            <h2>Ingredient Analyzer</h2>
            <p>Paste the full ingredient list of your product below</p>

            <form method="POST" action="/analyze-ingredients">
                <textarea
                    name="ingredients"
                    required></textarea>

                <button class="primary-btn" type="submit">
                    Analyze Ingredients
                </button>
            </form>

            <a href="/" class="secondary-link">
                ← Back to Home
            </a>

        </div>
    </div>

</body>
</html>
