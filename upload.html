<!DOCTYPE html>
<html>
<head>
    <title>Face Scan</title>
</head>
<body>
    <h2>Upload your face photo</h2>
    <form action="/scan" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Scan</button>
    </form>
</body>
</html>
